name: Release sdf-server-core

# ─── Trigger ──────────────────────────────────────────────────────────────────
# Push a tag like: git tag sdf-server-core-v0.2.0 && git push --tags
# This builds the package, verifies it, and publishes to npm.

on:
  push:
    tags:
      - 'sdf-server-core-v*'

permissions:
  contents: write

jobs:

  # ── Publish to npm ─────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#sdf-server-core-v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci
        working-directory: packages/sdf-server-core

      - name: Typecheck
        run: npm run typecheck
        working-directory: packages/sdf-server-core

      - name: Build
        run: npm run build
        working-directory: packages/sdf-server-core

      - name: Verify package contents
        run: npm pack --dry-run
        working-directory: packages/sdf-server-core

      - name: Publish
        run: npm publish --access public
        working-directory: packages/sdf-server-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#sdf-server-core-v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "sdf-server-core v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## @etapsky/sdf-server-core v${{ steps.version.outputs.version }}

            ### Install
            ```bash
            npm install @etapsky/sdf-server-core
            ```

            ### What's included
            - Fastify server factory (`buildServer`)
            - BullMQ workers (validate-sdf, sign-sdf, webhook-delivery)
            - Drizzle ORM + PostgreSQL schema
            - S3/MinIO storage adapter (native fetch, no AWS SDK)
            - SAML 2.0 SSO + per-tenant JWT issuance
            - ERP Connectors (SAP S/4HANA, Oracle Fusion)

            ### Changelog
            See [CHANGELOG.md](https://github.com/etapsky/sdf/blob/main/packages/sdf-server-core/CHANGELOG.md)
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
