name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── sdf-kit ────────────────────────────────────────────────────────────────
  sdf-kit:
    name: sdf-kit — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci
        working-directory: packages/sdf-kit

      - name: Typecheck
        run: npm run typecheck
        working-directory: packages/sdf-kit

      - name: Test
        run: npm test
        working-directory: packages/sdf-kit

      - name: Build
        run: npm run build
        working-directory: packages/sdf-kit

  # ── sdf-server-core ────────────────────────────────────────────────────────
  sdf-server-core:
    name: sdf-server-core — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci
        working-directory: packages/sdf-server-core

      - name: Typecheck
        run: npm run typecheck
        working-directory: packages/sdf-server-core

      - name: Build
        run: npm run build
        working-directory: packages/sdf-server-core

  # ── Coverage ───────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: sdf-kit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: packages/sdf-kit

      - name: Test with coverage
        run: npm run test:coverage
        working-directory: packages/sdf-kit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/sdf-kit/coverage/
          retention-days: 7
