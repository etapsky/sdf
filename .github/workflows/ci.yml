name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── sdf-kit ────────────────────────────────────────────────────────────────
  sdf-kit:
    name: sdf-kit — Bun ${{ matrix.bun-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        bun-version: [latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck
        working-directory: packages/sdf-kit

      - name: Test
        run: bun run test
        working-directory: packages/sdf-kit

      - name: Build
        run: bun run build
        working-directory: packages/sdf-kit

  # ── sdf-server-core ────────────────────────────────────────────────────────
  sdf-server-core:
    name: sdf-server-core — Bun latest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck
        working-directory: packages/sdf-server-core

      - name: Build
        run: bun run build
        working-directory: packages/sdf-server-core

  # ── Coverage ───────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: sdf-kit

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Test with coverage
        run: bun run test:coverage
        working-directory: packages/sdf-kit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/sdf-kit/coverage/
          retention-days: 7
