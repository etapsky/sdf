name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install sdf-kit dependencies
        run: npm ci
        working-directory: packages/sdf-kit

      - name: Typecheck
        run: npm run typecheck
        working-directory: packages/sdf-kit

      - name: Test
        run: npm test
        working-directory: packages/sdf-kit

      - name: Build
        run: npm run build
        working-directory: packages/sdf-kit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install sdf-kit dependencies
        run: npm ci
        working-directory: packages/sdf-kit

      - name: Test with coverage
        run: npm run test:coverage
        working-directory: packages/sdf-kit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/sdf-kit/coverage/
          retention-days: 7
