version: '3.9'

# ─── @etapsky/sdf-server — Local Development Stack ───────────────────────────
# Copyright (c) 2026 Yunus YILDIZ — SPDX-License-Identifier: BUSL-1.1
# MinIO only — PostgreSQL 17 and Redis run natively on macOS.
#
# Native services (do NOT run via Docker):
#   PostgreSQL 17 → Postgres.app on port 5432
#   Redis         → brew install redis, port 6379
#
# Start:  docker compose up -d
# Stop:   docker compose down
# The sdf-server itself runs outside Docker via `npm run dev`.

services:

  minio:
    image: minio/minio:latest
    container_name: sdf-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # MinIO Console
    volumes:
      - sdf-minio-data:/data
    healthcheck:
      test:     ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout:  5s
      retries:  5

  # MinIO bucket setup — runs once then exits
  minio-init:
    image: minio/mc:latest
    container_name: sdf-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/sdf-documents &&
        mc policy set private local/sdf-documents &&
        echo 'MinIO bucket created'
      "

volumes:
  sdf-minio-data: