[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sdf-python"
version = "0.1.0"
description = "SDF (Smart Document Format) — producer, reader, validator, signer"
readme = "README.md"
license = {text = "BUSL-1.1"}
authors = [{name = "Yunus YILDIZ", email = "yunus.yildiz@etapsky.com"}]
keywords = ["sdf", "smart-document-format", "document", "pdf", "json-schema"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business",
]
requires-python = ">=3.11"
dependencies = [
    "jsonschema>=4.21.0",
    "reportlab>=4.0.0",
    "cryptography>=42.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
]

[project.urls]
Homepage = "https://github.com/etapsky/sdf"
Repository = "https://github.com/etapsky/sdf"
Documentation = "https://github.com/etapsky/sdf#readme"

[tool.setuptools.packages.find]
where = ["."]
include = ["sdf*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
